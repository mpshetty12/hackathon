<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

  
<style>
* {box-sizing: border-box;}

body { 
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

#navbar {
  overflow: hidden;
  background-color: #f1f1f1;
  padding: 90px 10px;
  transition: 1s;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 99;
  min-height: fit-content;
}

#navbar a {
  float: left;
  color: black;
  text-align: center;
  padding: 12px;
  text-decoration: none;
  font-size: 18px; 
  line-height: 25px;
  border-radius: 4px;
}

#navbar #logo {
  font-size: 35px;
  font-weight: bold;
  transition: 0.4s;
}

#navbar a:hover {
  background-color: #ddd;
  color: black;
}

#navbar a.active {
  background-color: dodgerblue;
  color: white;
}

#navbar-right {
  float: right;
}
#section1 {padding-top:250px;height:500px;color: #fff; background-color: red;}
  #section2 {padding-top:250px;height:500px;color:black; background-color: white;}
  #section3 {padding-top:250px;height:500px;color: #fff; background-color: blue;}
  #section41 {padding-top:250px;height:500px;color: #fff; background-color: greenyellow;}
  #section42 {padding-top:250px;height:500px;color: #fff; background-color: #009688;}

@media screen and (max-width: 600px) {
  #navbar {
    padding:unset
  }
  #navbar a {
    float: none;
    display: block;
    text-align: left;
  }
  #navbar-right {
    float: none;
  }
}
</style>
</head>
<body data-spy="scroll" data-target=".navbar" data-offset="50">

<div id="navbar">
  <a href="#default" id="logo">CODE---RED</a>
  <div id="navbar-right">
    <a class="active" href="#section2">ABOUT</a>
    <a href="#section3">CONTRIBUTE</a>
    <a href="#section41">LOGIN</a>
    <br>
    
  </div>
</div>

<div style="margin-top:210px;padding:15px 15px 2500px;font-size:30px">
  <p><b>This one is created by CODE --- RED TEAM</b></p>
  <p>HEY  SUHAS VARUN PRANAV</p>
  <p>code red   </p>
  <div id="section1" class="container-fluid">
    <h1>Section 1</h1>
  </div>
  <div id="section2" class="container-fluid">
    <h1>ABOUT</h1>
  </div>
  <div id="section3" class="container-fluid">
    <h1>CONTRIBUTE</h1>
  </div>
  <div id="section41" class="container-fluid">
    <h1>LOGIN</h1>
  </div>
</div>

<script>
// When the user scrolls down 80px from the top of the document, resize the navbar's padding and the logo's font size
window.onscroll = function() {scrollFunction()};

function scrollFunction() {
  if (document.body.scrollTop > 80 || document.documentElement.scrollTop > 80) {
    document.getElementById("navbar").style.padding = "30px 10px";
    document.getElementById("logo").style.fontSize = "25px";
  } else {
    document.getElementById("navbar").style.padding = "80px 10px";
    document.getElementById("logo").style.fontSize = "35px";
  }
}
</script>

</body>
</html>
